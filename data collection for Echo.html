
<html>
<head>
<meta charset="utf-8">
<title>submit</title>
<style>
  #box {
    width: 100%;
    max-width: 500px;
    border: 1px solid black;
    padding: 10px;
    font-family: Arial, sans-serif;
  }
  textarea {
    width: 100%;
    height: 100px;
    font-family: Arial, sans-serif;
    font-size: 14px;
  }
  #status {
    margin-left: 10px;
  }
</style>
</head>
<body>

<div id="box">
  <b>submit something</b>
  <p style="font-size:12px; color:gray;">
    submissions get emailed to the site owner
  </p>

  <form id="submitForm">
    <textarea name="message" placeholder="type here" required></textarea>
    <br>
    <button type="submit">Submit</button>
    <span id="status"></span>
  </form>
</div>

<script>
 
  const FORM_ENDPOINT = "https://formspree.io/f/xdaqnorz";

  const form = document.getElementById("submitForm");
  const status = document.getElementById("status");

  form.addEventListener("submit", async function (e) {
    e.preventDefault();

    if (FORM_ENDPOINT === "PASTE_YOUR_FORMSPREE_ENDPOINT_HERE") {
      status.textContent = "no formspree endpoint set in the code";
      return;
    }

    status.textContent = "sending...";
    const data = new FormData(form);

    try {
      const response = await fetch(FORM_ENDPOINT, {
        method: "POST",
        body: data,
        headers: { "Accept": "application/json" }
      });
      if (response.ok) {
        status.textContent = "submitted";
        form.reset();
      } else {
        status.textContent = "error, try again";
      }
    } catch (err) {
      status.textContent = "error, try again";
    }
  });
</script>

</body>
</html>
