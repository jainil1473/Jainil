
<html>
<head>
<meta charset="utf-8">
<title> Echo </title>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  #chatbox {
    width: 100%;
    height: 500px;
    max-height: 85vh;
    border: 1px solid black;
    display: flex;
    flex-direction: column;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 5px;
  }
  #inputrow {
    display: flex;
  }
</style>
</head>
<body>

<script type="text/babel">
const { useState, useRef, useEffect } = React;


const API_KEY = "AQ.Ab8RN6IUqhGp4uzubXNnO2N4LBiTdeIf6gr8upFN-0K-KGuTkw";

function App() {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [knowledge, setKnowledge] = useState("");
  const [showFeed, setShowFeed] = useState(false);
  const [unlocked, setUnlocked] = useState(false);
  const [pw, setPw] = useState("");
  const [pwError, setPwError] = useState("");
  const scrollRef = useRef(null);

  const PASSWORD = "Jainil";

  const tryUnlock = () => {
    if (pw === PASSWORD) {
      setUnlocked(true);
      setShowFeed(true);
      setPw("");
      setPwError("");
    } else {
      setPwError("wrong password");
      setTimeout(() => setPwError(""), 1500);
    }
  };

  useEffect(() => {
    if (scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [messages, loading]);

  const send = async () => {
    const text = input.trim();
    if (!text || loading) return;
    if (API_KEY === "PASTE_YOUR_KEY_HERE") {
      setMessages(prev => [...prev, { role: "user", content: text }, { role: "assistant", content: "no api key set in the code" }]);
      setInput("");
      return;
    }
    const newMessages = [...messages, { role: "user", content: text }];
    setMessages(newMessages);
    setInput("");
    setLoading(true);

    try {
      await new Promise(r => setTimeout(r, 3000));

      const context = knowledge.trim()
        ? "Reference info you were given:\n" + knowledge.trim()
        : "";

      const response = await fetch(
        "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent",
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-goog-api-key": API_KEY
          },
          body: JSON.stringify({
            systemInstruction: {
              parts: [{ text: "You are a flat, emotionless chat assistant. Keep replies extremely short, under 10 words. No enthusiasm, no exclamation points, no emojis, no questions back. If you cannot do what is asked, reply with exactly \I can't understand\" and nothing else. " + context }]
            },
            contents: newMessages.map(m => ({
              role: m.role === "assistant" ? "model" : "user",
              parts: [{ text: m.content }]
            }))
          })
        }
      );
      const data = await response.json();
      let reply;
      if (data.error) {
        reply = "api error: " + data.error.message;
      } else {
        const part = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0];
        reply = part ? part.text : "no text in response: " + JSON.stringify(data);
      }
      setMessages(prev => [...prev, { role: "assistant", content: reply }]);
    } catch (err) {
      setMessages(prev => [...prev, { role: "assistant", content: "error, try again" }]);
    } finally {
      setLoading(false);
    }
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  };

  return (
    <React.Fragment>
    <div id="chatbox">
      <div style={{textAlign: "center"}}>
        <b>Echo</b>
      </div>
      <hr />

      <div id="messages" ref={scrollRef}>
        {messages.map((m, i) => (
          <div key={i}>
            <b>{m.role === "user" ? "you:" : "echo:"}</b> {m.content}
          </div>
        ))}
      </div>

      <div id="inputrow">
        <input
          type="text"
          value={input}
          placeholder="type here"
          onChange={(e) => setInput(e.target.value)}
          onKeyDown={handleKeyDown}
        />
        <button onClick={send} disabled={loading || !input.trim()}>Send</button>
      </div>
    </div>

    <div style={{marginTop: "10px", border: "1px solid black", padding: "8px", maxWidth: "600px"}}>
      {!unlocked ? (
        <div>
          <input
            type="password"
            value={pw}
            placeholder="password to feed data"
            onChange={(e) => setPw(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && tryUnlock()}
          />
          <button onClick={tryUnlock}>Unlock</button>
          {pwError && <span style={{marginLeft: "5px", color: "red"}}>{pwError}</span>}
        </div>
      ) : (
        <div>
          <button onClick={() => setShowFeed(!showFeed)}>
            {showFeed ? "hide feed box" : "feed data"}
          </button>
          {showFeed && (
            <div style={{marginTop: "5px"}}>
              <textarea
                value={knowledge}
                placeholder="paste data here for echo to use"
                onChange={(e) => setKnowledge(e.target.value)}
                style={{width: "100%", height: "80px"}}
              />
              <div style={{fontSize: "11px", color: "gray"}}>
                {knowledge.trim() ? "echo will use this in its replies" : "nothing fed yet"}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
  <a href="data%20collection%20for%20eEcho.html">Go to Data Collection Page</a>
</body>
</html>
